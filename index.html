<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Haur</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&family=Parkinsans:wght@300..800&family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- STYLE TAMBAHAN (ELEGAN HAUR 🌿) -->
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(to bottom, #ecfdf5, #d1fae5);
      }

      /* NAVBAR */
      .navbar {
        background: linear-gradient(90deg, #14532d, #166534);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
      }

      .nav-link {
        transition: 0.3s;
      }

      .nav-link:hover {
        color: #bbf7d0 !important;
      }

      /* SEARCH */
      #search-input {
        border-radius: 20px;
        border: 1px solid #16a34a;
      }

      .btn-outline-dark {
        border-radius: 20px;
        border-color: #16a34a;
        color: #14532d;
      }

      .btn-outline-dark:hover {
        background-color: #16a34a;
        color: white;
      }

      /* PRODUCT CARD (AKAN KENA DARI JS) */
      #product-container > div {
        transition: 0.3s;
      }

      #product-container > div > div {
        background: white;
        border-radius: 20px;
        padding: 15px;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      #product-container > div > div:hover {
        transform: translateY(-8px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      /* BUTTON BELI */
      button {
        border-radius: 50px !important;
      }

      .btn-buy {
        background: linear-gradient(90deg, #16a34a, #22c55e);
        border: none;
        color: white;
      }

      .btn-buy:hover {
        background: linear-gradient(90deg, #15803d, #16a34a);
      }

      /* SCROLL */
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>

  <body class="bg-green">
    <!-- Header Start -->
    <nav class="navbar bg-success navbar-dark fw-semibold">
      <div class="container-fluid"></div>
      <div class="container-fluid">
        <a class="navbar-brand fs-3" href="#">
          <img
            src="assets/img/image.png"
            alt="Logo"
            width="30"
            height="24"
            class="d-inline-block align-text-top"
          />
          Toko Haur 🌿
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active fw-bold" href="#">Halaman Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shop.html">Keranjang Belanja</a>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Others
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="social.html">Social Media</a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="contact.html">Contact Me</a>
                </li>
              </ul>
            </li>
          </ul>

          <form class="d-flex mt-2" role="search" id="search-form">
            <input
              class="form-control me-2"
              type="search"
              placeholder="Cari produk bambu..."
              id="search-input"
            />
            <button class="btn btn-outline-dark" type="submit">
              Search
            </button>
          </form>
        </div>
      </div>
    </nav>
    <!-- Header End -->

    <!-- Main Start -->
    <main class="px-4 py-3 mt-3">
      <section>
        <div class="row" id="product-container"></div>
      </section>
    </main>
    <!-- Main End -->

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script kamu tetap -->
    <script src="assets/js/script.js"></script>
  </body>
</html>
