<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact HAUR</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- STYLE TAMBAHAN HAUR 🌿 -->
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(to bottom, #ecfdf5, #d1fae5);
      }

      /* NAVBAR */
      .navbar {
        background: linear-gradient(90deg, #14532d, #166534);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .navbar-brand {
        font-weight: bold;
        color: white !important;
      }

      .nav-link {
        color: white !important;
      }

      .nav-link:hover {
        color: #bbf7d0 !important;
      }

      /* CONTACT INFO */
      .contact-info h1 {
        color: #14532d;
        font-weight: bold;
      }

      .contact-info h4 {
        color: #166534;
      }

      .contact-info i {
        font-size: 1.5rem;
        color: #16a34a;
        margin-right: 10px;
      }

      .contact-info p {
        color: #374151;
      }

      /* FORM */
      .form-container {
        background: white;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        padding: 30px;
        border-radius: 20px;
        transition: 0.3s;
      }

      .form-container:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .form-container h2 {
        color: #14532d;
        margin-bottom: 20px;
        font-weight: 600;
      }

      .form-control {
        border-radius: 10px;
        border: 1px solid #d1d5db;
      }

      .form-control:focus {
        border-color: #16a34a;
        box-shadow: 0 0 0 0.2rem rgba(22, 163, 74, 0.2);
      }

      /* BUTTON */
      .btn-warning {
        background: linear-gradient(90deg, #16a34a, #22c55e);
        border: none;
        color: white;
        border-radius: 50px;
      }

      .btn-warning:hover {
        background: linear-gradient(90deg, #15803d, #16a34a);
      }
    </style>
  </head>

  <body>
    <!-- Header Start -->
    <nav class="navbar fw-semibold">
      <div class="container-fluid"></div>
      <div class="container-fluid">
        <a class="navbar-brand fs-3" href="#">
          <img
            src="assets/img/image.png"
            alt="Logo"
            width="30"
            height="24"
            class="d-inline-block align-text-top"
          />
          HAUR 🌿
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Halaman Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="shop.html">Keranjang Belanja</a>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Others
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="social.html">Social Media</a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="contact.html">Contact Me</a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Header End -->

    <!-- Main Start -->
    <main class="px-4 py-5 mt-3">
      <section>
        <div class="row">
          <!-- Contact Info -->
          <div class="col-md-6 mb-4">
            <div class="contact-info">
              <h1 class="fs-1 mb-3">Kontak HAUR 🌿</h1>
              <h4 class="fs-4">Informasi Kontak</h4>

              <p class="d-flex align-items-center fs-5">
                <i class="fas fa-phone"></i> <span>+62 852-2010-0211</span>
              </p>

              
              <p class="d-flex align-items-center fs-5">
                <i class="fas fa-envelope"></i> <span>gunawanhaur@gmail.com
                </span>
              </p>

              <p class="d-flex align-items-center fs-5">
                <i class="fas fa-envelope"></i> <span>
                  komunitashaur.id@gmail.com</span>
              </p>

              <p class="d-flex align-items-center fs-5">
                <i class="fas fa-map-marker-alt"></i>
                <span>Jawa Barat, Indonesia</span>
              </p>
            </div>
          </div>

          <!-- Form -->
          <div class="col-md-6">
            <div class="form-container">
              <h2>Hubungi Kami</h2>

              <form>
                <div class="mb-3">
                  <label class="form-label">Nama Lengkap</label>
                  <input type="text" class="form-control" required />
                </div>

                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" class="form-control" required />
                </div>

                <div class="mb-3">
                  <label class="form-label">Pesan</label>
                  <textarea class="form-control" rows="4" required></textarea>
                </div>

                <a
                  href="https://wa.me/6285220100211?text=Halo%20Saya%20ingin%20memesan%20produk%20HAUR"
                  class="btn btn-warning w-100 fw-semibold"
                  target="_blank"
                >
                  Kirim via WhatsApp
                </a>
              </form>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
