<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keranjang Belanja</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- STYLE TAMBAHAN (HAUR 🌿) -->
    <style>
      body {
        font-family: "Roboto", sans-serif;
        background: linear-gradient(to bottom, #ecfdf5, #d1fae5);
      }

      /* NAVBAR */
      .navbar {
        background: linear-gradient(90deg, #14532d, #166534);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      .navbar-brand {
        font-weight: bold;
        color: white !important;
      }

      .nav-link {
        color: white !important;
      }

      .nav-link.active {
        font-weight: bold;
        color: #bbf7d0 !important;
      }

      .nav-link:hover {
        color: #bbf7d0 !important;
      }

      /* JUDUL */
      h1 {
        font-weight: bold;
        color: #14532d;
      }

      /* CARD PRODUK */
      .card {
        border-radius: 20px;
        overflow: hidden;
        border: none;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .card-body {
        background: white !important;
      }

      .card-title {
        color: #14532d;
        font-weight: 600;
      }

      .card-text {
        color: #16a34a;
        font-weight: 500;
      }

      /* BUTTON */
      .btn-danger {
        border-radius: 50px;
        padding: 6px 20px;
        background: #dc2626;
        border: none;
      }

      .btn-danger:hover {
        background: #b91c1c;
      }

      /* TOTAL */
      h3 {
        margin-top: 20px;
        padding: 15px;
        border-radius: 15px;
        background: white;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        color: #14532d;
      }

      /* EMPTY TEXT */
      .empty-text {
        background: white;
        padding: 20px;
        border-radius: 15px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        color: #14532d;
      }
    </style>
  </head>

  <body>
    <!-- Header Start -->
    <nav class="navbar navbar-dark fw-semibold">
      <div class="container-fluid"></div>
      <div class="container-fluid">
        <a class="navbar-brand fs-3" href="#">
          <img
            src="assets/img/image.png"
            alt="Logo"
            width="30"
            height="24"
            class="d-inline-block align-text-top"
          />
          HAUR 🌿
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Halaman Produk</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active fw-bold" href="#">
                Keranjang Belanja
              </a>
            </li>

            <li class="nav-item dropdown">
              <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                Others
              </a>
              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="social.html">Social Media</a>
                </li>
                <li><hr class="dropdown-divider" /></li>
                <li>
                  <a class="dropdown-item" href="contact.html">Contact Me</a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!-- Header End -->

    <!-- Main Start -->
    <main class="px-4 py-3 mt-3">
      <h1>Keranjang Belanja Anda</h1>
      <div id="keranjang-container"></div>
    </main>
    <!-- Main End -->

    <script>
      const keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];
      const keranjangContainer = document.getElementById("keranjang-container");

      if (keranjang.length === 0) {
        keranjangContainer.innerHTML = `<p class="empty-text fw-bolder fs-5">Keranjang Anda kosong, Silahkan Masukkan Barang Ke Keranjang Belanja Anda.</p>`;
      } else {
        let totalHarga = 0;

        keranjang.forEach((item, index) => {
          const produkElement = document.createElement("div");
          produkElement.classList.add("card", "mb-3");
          produkElement.innerHTML = `
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h5 class="card-title">${item.nama}</h5>
            <p class="card-text">Rp ${parseInt(item.harga).toLocaleString()}</p>
          </div>
          <button class="btn btn-danger btn-sm remove-item" data-index="${index}">Hapus</button>
        </div>
      `;
          keranjangContainer.appendChild(produkElement);
          totalHarga += parseInt(item.harga);
        });

        const totalElement = document.createElement("div");
        totalElement.innerHTML = `<h3>Total : Rp ${totalHarga.toLocaleString()}</h3>`;
        keranjangContainer.appendChild(totalElement);
      }

      keranjangContainer.addEventListener("click", function (event) {
        if (event.target.classList.contains("remove-item")) {
          const index = event.target.getAttribute("data-index");
          removeItemFromCart(index);
        }
      });

      function removeItemFromCart(index) {
        let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [];

        keranjang.splice(index, 1);

        localStorage.setItem("keranjang", JSON.stringify(keranjang));

        location.reload();
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
